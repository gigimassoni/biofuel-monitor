name: Atualizar BioFuel Monitor

on:
  schedule:
    # Roda todo dia às 07:00 UTC (04:00 horário de Brasília)
    - cron: '0 7 * * *'
  workflow_dispatch: {}   # permite rodar manualmente pelo botão "Run workflow"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Buscar notícias e gerar index.html
        run: python build.py

      - name: Publicar alterações
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "Atualização automática de notícias"
          git push
