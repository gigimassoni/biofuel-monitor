name: Atualizar BioFuel Monitor

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Buscar notícias e gerar index.html
        env:
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
        run: python build.py

      - name: Publicar alterações
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "Atualizacao automatica de noticias"
          git push
